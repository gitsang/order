version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - traefik-public
    profiles:
      - traefik

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-order}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-order123}
      POSTGRES_DB: ${DB_NAME:-order}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-order}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Containerfile.order
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-order}
      DB_PASSWORD: ${DB_PASSWORD:-order123}
      DB_NAME: ${DB_NAME:-order}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    labels:
      - traefik.enable=true
      - traefik.http.routers.order-server.rule=Host(`${HOST}`) && PathPrefix(`/api`)
      - traefik.http.services.order-server.loadbalancer.server.port=8080
    networks:
      - default
      - traefik-public
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - split

  web:
    build:
      context: .
      dockerfile: Containerfile.order-web
    labels:
      - traefik.enable=true
      - traefik.http.routers.order-web.rule=Host(`${HOST}`)
      - traefik.http.services.order-web.loadbalancer.server.port=3000
    networks:
      - traefik-public
    profiles:
      - split

  order:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-order}
      DB_PASSWORD: ${DB_PASSWORD:-order123}
      DB_NAME: ${DB_NAME:-order}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    ports:
      - "3000:3000"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - allinone

volumes:
  pgdata:

networks:
  default:
  traefik-public:
